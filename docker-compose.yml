version: "3.9"

services:
  # ── MySQL ──────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: shop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-shop_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shop_net

  # ── Backend (Spring Boot) ───────────────────────────────────
  backend:
    build:
      context: ./BE
      dockerfile: Dockerfile
    container_name: shop_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-shop_db}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "8080:8080"
    networks:
      - shop_net

  # ── Frontend (React + Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./FE
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: shop_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - shop_net

volumes:
  mysql_data:

networks:
  shop_net:
    driver: bridge
